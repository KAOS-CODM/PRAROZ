<!DOCTYPE html>
<html lang="en" class="h-full">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PraRoz Admin | Recipe Management</title>
    <meta name="description" content="Recipe moderation" />
    <link rel="stylesheet" href="/css/styles.css" />
<link rel="stylesheet" href="/assets/fontawesome/css/all.min.css" />
  </head>
  <body
    class="min-h-full bg-slate-100 text-slate-900 transition-colors duration-300 dark:bg-slate-950 dark:text-slate-100"
    data-active-page="recipes"
  >
    <div class="min-h-screen">
      <header class="sticky top-0 z-40 border-b border-slate-200 bg-white backdrop-blur-xl dark:border-slate-800 dark:bg-slate-900">
        <div class="mx-auto flex max-w-7xl flex-wrap items-center justify-between gap-4 px-4 py-4 sm:px-6 lg:px-8">
          <div class="flex items-center gap-3">
            <div class="flex h-11 w-11 items-center justify-center rounded-2xl bg-emerald-600 text-white shadow-lg shadow-emerald-600">
              <svg class="h-6 w-6" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7h18"></path><path d="M6 7V5h12v2"></path><path d="M5 7l1 12h12l1-12"></path><path d="M9 11v5"></path><path d="M15 11v5"></path></svg>
            </div>
            <div>
              <p class="text-xs font-semibold uppercase tracking-[0.2em] text-slate-500 dark:text-slate-400">PraRoz Admin</p>
              <h1 class="text-xl font-semibold text-slate-900 dark:text-slate-100">Recipes</h1>
            </div>
          </div>

          <div class="flex flex-1 flex-wrap items-center justify-end gap-3">
            <label for="admin-global-search" class="flex min-w-55 flex-1 items-center gap-2 rounded-2xl border border-slate-200 bg-slate-50 px-3 py-2 shadow-sm dark:border-slate-700 dark:bg-slate-800 sm:max-w-md">
              <svg class="h-4 w-4 text-slate-400" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="6"></circle><path d="m20 20-4.2-4.2"></path></svg>
              <input id="admin-global-search" type="search" placeholder="Search recipes or comments" class="w-full bg-transparent text-sm outline-none placeholder:text-slate-400" aria-label="Search recipes" />
            </label>
            <button
              id="theme-toggle"
              type="button"
              class="rounded-2xl border border-slate-200 bg-white p-2.5 text-slate-700 shadow-sm transition hover:bg-slate-100 dark:border-slate-700 dark:bg-slate-800 dark:text-slate-100 dark:hover:bg-slate-700"
              aria-label="Toggle dark mode"
              aria-pressed="false"
            ><svg class="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79Z"></path>
            </svg></button>
            <button id="logout-button" type="button" class="inline-flex items-center gap-2 rounded-2xl bg-slate-900 px-4 py-2.5 text-sm font-semibold text-white transition hover:bg-slate-700 dark:bg-emerald-500 dark:hover:bg-emerald-400" aria-label="Log out">
              <svg class="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><path d="m16 17 5-5-5-5"></path><path d="M21 12H9"></path></svg>
              Logout
            </button>
          </div>
        </div>
      </header>

      <div class="mx-auto grid max-w-7xl grid-cols-1 gap-6 px-4 py-6 sm:px-6 lg:grid-cols-[16rem_1fr] lg:px-8">
        <aside class="lg:sticky lg:top-21">
          <nav class="rounded-3xl border border-slate-200 bg-slate-50 p-3 shadow-sm dark:border-slate-800 dark:bg-slate-900">
            <ul class="space-y-1">
              <li>
                <a data-nav="dashboard" href="/admin" class="group flex items-center gap-3 rounded-2xl px-3 py-2 text-sm font-medium transition hover:bg-slate-50 dark:hover:bg-slate-800">
                  <span class="inline-flex h-9 w-9 items-center justify-center rounded-2xl bg-slate-100 text-slate-600 transition group-hover:bg-gray-600 group-hover:text-white dark:bg-slate-800 dark:text-slate-300">
                    <i class="fas fa-home"></i>
                  </span>
                  Dashboard
                </a>
              </li>
              <li>
                <a data-nav="recipes" href="/admin/recipes" class="group flex items-center gap-3 rounded-2xl px-3 py-2 text-sm font-medium transition hover:bg-slate-50 dark:hover:bg-slate-800">
                  <span class="inline-flex h-9 w-9 items-center justify-center rounded-2xl bg-slate-100 text-slate-600 transition group-hover:bg-gray-600 group-hover:text-white dark:bg-slate-800 dark:text-slate-300">
                    <i class="fas fa-folder"></i>
                  </span>
                  Recipes
                </a>
              </li>
              <li>
                <a data-nav="comments" href="/admin/comments" class="group flex items-center gap-3 rounded-2xl px-3 py-2 text-sm font-medium transition hover:bg-slate-50 dark:hover:bg-slate-800">
                  <span class="inline-flex h-9 w-9 items-center justify-center rounded-2xl bg-slate-100 text-slate-600 transition group-hover:bg-gray-600 group-hover:text-white dark:bg-slate-800 dark:text-slate-300">
                    <i class="fas fa-comments"></i>
                  </span>
                  Comments
                </a>
              </li>
              <li>
                <a data-nav="contacts" href="/admin/contacts" class="group flex items-center gap-3 rounded-2xl px-3 py-2 text-sm font-medium transition hover:bg-slate-50 dark:hover:bg-slate-800">
                  <span class="inline-flex h-9 w-9 items-center justify-center rounded-2xl bg-slate-100 text-slate-600 transition group-hover:bg-gray-600 group-hover:text-white dark:bg-slate-800 dark:text-slate-300">
                    <i class="fas fa-phone"></i>
                  </span>
                  Contacts
                </a>
              </li>
              <li>
                <a data-nav="settings" href="/admin/settings" class="group flex items-center gap-3 rounded-2xl px-3 py-2 text-sm font-medium transition hover:bg-slate-50 dark:hover:bg-slate-800">
                  <span class="inline-flex h-9 w-9 items-center justify-center rounded-2xl bg-slate-100 text-slate-600 transition group-hover:bg-gray-600 group-hover:text-white dark:bg-slate-800 dark:text-slate-300">
                    <i class="fas fa-gear"></i>
                  </span>
                  Settings
                </a>
              </li>
            </ul>
          </nav>
        </aside>

        <main class="space-y-6">
          <section class="rounded-3xl border border-slate-200 bg-white p-4 shadow-sm dark:border-slate-800 dark:bg-slate-800 sm:p-6">
            <div class="flex flex-wrap items-center justify-between gap-4 border-b border-slate-200 pb-4 dark:border-slate-700">
              <div>
                <p class="text-sm font-semibold uppercase tracking-[0.2em] text-slate-500 dark:text-slate-400">Recipes</p>
                <h2 class="mt-1 text-2xl font-semibold text-slate-900 dark:text-slate-100">Recipe moderation</h2>
              </div>
              <div class="inline-flex rounded-2xl border border-slate-200 bg-slate-50 p-1 dark:border-slate-700 dark:bg-slate-900" role="tablist" aria-label="Recipe views">
                <button type="button" class="rounded-xl border border-emerald-500 px-4 py-2 text-sm font-medium text-emerald-600 transition dark:text-emerald-300" data-tab="pending">Pending Recipes</button>
                <button type="button" class="rounded-xl px-4 py-2 text-sm font-medium text-slate-500 transition hover:text-slate-900 dark:text-slate-400 dark:hover:text-slate-100" data-tab="approved">Approved Recipes</button>
              </div>
            </div>

            <div class="mt-4 grid gap-4 md:grid-cols-2">
              <article class="rounded-2xl border border-slate-200 bg-slate-50 p-4 dark:border-slate-700 dark:bg-slate-900">
                <p class="text-sm font-medium text-slate-500 dark:text-slate-400">Pending</p>
                <p id="stat-pending-recipes" class="mt-2 text-3xl font-semibold text-slate-900 dark:text-slate-100">0</p>
              </article>
              <article class="rounded-2xl border border-slate-200 bg-slate-50 p-4 dark:border-slate-700 dark:bg-slate-900">
                <p class="text-sm font-medium text-slate-500 dark:text-slate-400">Approved</p>
                <p id="stat-approved-recipes" class="mt-2 text-3xl font-semibold text-slate-900 dark:text-slate-100">0</p>
              </article>
            </div>

            <div id="recipe-list" class="mt-6" aria-live="polite"></div>
          </section>
        </main>
      </div>
    </div>

    <div id="toast-container" class="pointer-events-none fixed right-4 top-4 z-50 flex w-[min(92vw,24rem)] flex-col gap-3"></div>
    <div id="modal-root"></div>
    <div id="edit-modal-root"></div>

    <script src="/js/config.js"></script>
    <script src="/js/admin/api.js"></script>
    <script src="/js/admin/ui.js"></script>
    <script src="/js/admin/auth.js"></script>
    <script src="/js/admin/app.js"></script>
    <script src="/js/admin/recipes.js"></script>
  </body>
</html>
