<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>PRAROZ™ | CONTACT US</title>
        <link rel="stylesheet" type="text/css" href="/css/styles.css">
         
         
         
         
        <link rel="stylesheet" type="text/css" href="/assets/fontawesome/css/all.min.css">
        <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&family=Lora:wght@400;700&display=swap" rel="stylesheet">
        <link href="https://fonts.googleapis.com/css2?family=Tangerin&display=swap " rel="stylesheet">
        <link rel="icon" type="image/png" href="/images/favicon.ico">
    </head>
    <body class="min-h-screen flex flex-col bg-gray-100 text-gray-900 dark:bg-slate-900 dark:text-gray-100 transition-colors duration-300">

        <div class="background"></div>

        <header id="navbar-container"></header>

        <main class="mx-auto w-full max-w-3xl px-6 py-12">
        
            <section class="rounded-3xl bg-white p-8 shadow-lg dark:bg-slate-800">
        
                <h1 class="mb-3 text-center text-4xl font-bold dark:text-white">
                    Contact Us
                </h1>
        
                <p class="mb-10 text-center text-gray-600 dark:text-gray-300">
                    Have a question, recipe suggestion, feedback, or business enquiry?
                    We'd love to hear from you.
                </p>
        
                <form
                    id="contact-form"
                    class="space-y-6"
                >
        
                    <input
                        id="name"
                        name="name"
                        type="text"
                        required
                        placeholder="Your Name"
                        class="w-full rounded-xl border border-gray-300 bg-white p-4 outline-none transition focus:border-orange-500 dark:border-slate-700 dark:bg-slate-900"
                    >
        
                    <input
                        id="email"
                        name="email"
                        type="email"
                        required
                        placeholder="Email Address"
                        class="w-full rounded-xl border border-gray-300 bg-white p-4 outline-none transition focus:border-orange-500 dark:border-slate-700 dark:bg-slate-900"
                    >
        
                    <div class="space-y-2">
                        <label
                            for="subject"
                            class="block text-sm font-medium text-gray-700 dark:text-gray-300"
                        >
                            What can we help you with?
                        </label>
                    
                        <select
                            id="subject"
                            name="subject"
                            required
                            class="
                                w-full
                                rounded-xl
                                border
                                border-gray-300
                                bg-white
                                p-4
                                text-gray-900
                                outline-none
                                transition
                                focus:border-orange-500
                                focus:ring-2
                                focus:ring-orange-200
                    
                                dark:border-slate-700
                                dark:bg-slate-900
                                dark:text-white
                                dark:focus:ring-orange-900
                            "
                        >
                            <option value="" selected disabled>Select a topic</option>
                    
                            <option value="recipe-request">
                                🍽️ Recipe Request
                            </option>
                    
                            <option value="report-error">
                                🐞 Report an Error
                            </option>
                    
                            <option value="recipe-submission">
                                📝 Recipe Submission Question
                            </option>
                    
                            <option value="business">
                                🤝 Business Enquiry
                            </option>
                    
                            <option value="advertising">
                                📢 Advertising
                            </option>
                    
                            <option value="other">
                                💬 Other
                            </option>
                        </select>
                    </div>
        
                    <textarea
                        id="message"
                        name="message"
                        rows="7"
                        required
                        placeholder="Write your message..."
                        class="w-full resize-none rounded-xl border border-gray-300 bg-white p-4 outline-none transition focus:border-orange-500 dark:border-slate-700 dark:bg-slate-900"
                    ></textarea>
        
                    <button
                        id="sendBtn"
                        disabled
                        class="
                            w-full
                            rounded-xl
                            bg-orange-500
                            py-4
                            font-semibold
                            text-white
                            transition
        
                            hover:bg-orange-600
        
                            disabled:cursor-not-allowed
                            disabled:bg-gray-400
                        "
                    >
                        Send Message
                    </button>
        
                </form>
        
                <p
                    id="form-status"
                    class="mt-6 text-center text-sm"
                ></p>
        
            </section>
        
        </main>

        <footer id="dynamic-footer"></footer>

        <script src="/js/config.js" defer></script>
        <script src="/js/contact.js" defer></script>
        <script src="/js/navbar.js" defer></script>
        <script src="/js/sidebar.js" defer></script>
        <script src="/js/footer.js" defer></script>
        <script src="/js/darkmode.js" defer></script>

    </body>
</html>
