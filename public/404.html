<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>404 - PraRoz Recipes</title>

    <link rel="stylesheet" href="/css/styles.css" />
    <link rel="stylesheet" href="/assets/fontawesome/css/all.min.css" />

    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Tangerine:wght@700&display=swap"
      rel="stylesheet"
    />
  </head>

  <body class="min-h-screen bg-slate-100 dark:bg-slate-950 text-slate-900 dark:text-slate-100 transition-colors duration-300">
    <header id="navbar-container"></header>

    <main class="relative mx-auto max-w-6xl px-5 py-16 lg:px-8">
      <!-- Background Blurs -->
      <div class="absolute left-0 top-0 h-72 w-72 rounded-full bg-orange-400/20 blur-3xl pointer-events-none"></div>
      <div class="absolute right-0 bottom-0 h-72 w-72 rounded-full bg-yellow-300/20 blur-3xl pointer-events-none"></div>

      <section class="relative overflow-hidden rounded-4xl bg-linear-to-r from-orange-500 via-orange-600 to-red-500 px-8 py-14 text-center text-white shadow-2xl">
        <div class="mx-auto flex h-24 w-24 items-center justify-center rounded-full bg-white/20 text-5xl backdrop-blur">
          <i class="fas fa-triangle-exclamation"></i>
        </div>

        <h1 class="mt-8 text-5xl font-bold">404</h1>
        <p class="mx-auto mt-4 max-w-2xl text-lg leading-8 text-orange-100">
          The page you’re looking for can’t be found.
        </p>

        <div class="mt-10 flex flex-col items-center gap-4">
          <a
            href="/"
            class="inline-flex items-center gap-3 rounded-2xl bg-white px-8 py-4 text-xl font-bold text-orange-600 shadow-xl transition hover:scale-105 hover:shadow-orange-500/40"
          >
            <i class="fas fa-house"></i>
            Go Home
          </a>

          <a
            href="/recipes"
            class="inline-flex items-center gap-3 rounded-2xl border border-white/30 bg-white/10 px-8 py-4 text-xl font-bold text-white shadow-lg transition hover:bg-white/15 hover:scale-105"
          >
            <i class="fas fa-utensils"></i>
            Browse Recipes
          </a>

          <p class="mt-2 max-w-2xl text-sm text-orange-100/90">
            If you think this is a mistake, contact
            <a href="mailto:support@praroz.com" class="underline underline-offset-4">support</a>.
          </p>
        </div>
      </section>
    </main>

    <footer id="dynamic-footer"></footer>

    <script src="/js/config.js"></script>
    <script src="/js/project.js" defer></script>
    <script src="/js/navbar.js" defer></script>
    <script src="/js/sidebar.js" defer></script>
    <script src="/js/footer.js" defer></script>
    <script src="/js/darkmode.js" defer></script>
  </body>
</html>
