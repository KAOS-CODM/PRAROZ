<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" type="text/css" href="/css/styles.css">
         
         
        <!--link rel="stylesheet" type="text/css" href="/css/recipe.css">
         
        <link rel="stylesheet" type="text/css" href="/css/comments.css"-->
         
        <link rel="stylesheet" type="text/css" href="/assets/fontawesome/css/all.min.css">
        <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&family=Lora:wght@400;700&display=swap" rel="stylesheet">
        <link href="https://fonts.googleapis.com/css2?family=Tangerin&display=swap " rel="stylesheet">
        <link rel="icon" type="image/png" href="/images/favicon.ico">
    </head>
    <body class="min-h-screen flex flex-col bg-stone-50 text-slate-800 transition-colors duration-300 dark:bg-slate-950 dark:text-slate-100">
        <header id="navbar-container"></header>

        <main id="recipe-details" aria-live="polite"
            class="
                mx-auto
                max-w-5xl
                px-6
                py-10
            
                [&_h1]:text-4xl
                [&_h1]:font-bold
                [&_h1]:mb-6
                
                [&_h2]:text-3xl
                [&_h2]:font-semibold
                [&_h2]:mt-10
                [&_h2]:mb-5
            
                [&_h3]:text-2xl
                [&_h3]:font-semibold
                [&_h3]:mt-8
                [&_h3]:mb-4
                
                [&_p]:mb-5
                [&_p]:leading-8
                [&_p]:text-lg
                [&_p]:text-gray-700
                dark:[&_p]:text-gray-300
                
                [&_strong]:font-semibold
                [&_strong]:text-orange-500
            
                [&_em]:italic
            
                [&_a]:text-orange-500
                hover:[&_a]:underline
            
                [&_ul]:my-6
                [&_ul]:list-disc
                [&_ul]:pl-8
                
                [&_ol]:my-6
                [&_ol]:list-decimal
                [&_ol]:pl-8
            
                [&_li]:mb-3
                [&_li]:leading-8
                
                [&_img]:rounded-xl
                [&_img]:shadow-lg
                [&_img]:mx-auto
            ">

            
        </main>

        <button
            id="theme-toggle"
            class="fixed bottom-5 left-5 z-50 flex h-12 w-12 items-center justify-center rounded-full bg-white text-black shadow-lg transition-all duration-300 hover:scale-110 hover:bg-slate-700 hover:dark:bg-slate-300 dark:bg-slate-700 dark:text-gray-300 dark:border dark:border-gray-700">
            🌙
        </button>

        <section id="comments-section" data-reveal="up"></section>
        
    
        <footer id="dynamic-footer"></footer>

        <script src="/js/config.js" defer></script>
        <script src="/js/recipe-details.js" defer></script>
        <script src="/js/navbar.js" defer></script>
        <script src="/js/sidebar.js" defer></script>
        <script src="/js/footer.js" defer></script>
        <script src="/js/darkmode.js" defer></script>
        <script src="/js/reveal.js" defer></script>
        <script src="/js/comments.js" defer></script>

    </body>
</html>
