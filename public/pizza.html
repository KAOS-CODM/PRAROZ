<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" type="text/css" href="/css/styles.css">
         
         
        <!--link rel="stylesheet" type="text/css" href="/css/recipe.css"-->
        <!--link rel="stylesheet" type="text/css" href="/css/search-bar.css"-->
         
         
        <link rel="stylesheet" type="text/css" href="/assets/fontawesome/css/all.min.css">
        <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&family=Lora:wght@400;700&display=swap" rel="stylesheet">
        <link href="https://fonts.googleapis.com/css2?family=Tangerin&display=swap " rel="stylesheet">
        <link rel="icon" type="image/png" href="/images/favicon.ico">
    </head>
    <body class="min-h-screen flex flex-col bg-stone-50 text-slate-800 transition-colors duration-300 dark:bg-slate-950 dark:text-slate-100">

        <div class="background"></div>

        <header id="navbar-container"></header>

        <main class="mx-auto mb-10 mt-8 w-[95%] max-w-7xl px-2 sm:px-4 lg:px-0">
            <!-- Theme Toggle -->
            <button
                id="theme-toggle"
                class="fixed bottom-5 left-5 z-50 flex h-12 w-12 items-center justify-center rounded-full border border-white bg-white text-slate-800 shadow-lg transition-all duration-300 hover:-translate-y-1 hover:scale-110 dark:border-slate-700 dark:bg-slate-800 dark:text-slate-100">
                🌙
            </button>
            <div
                id="content"
                class="
                    mx-auto
                    max-w-5xl
                    px-6
                    py-10
            
                    [&_h1]:text-4xl
                    [&_h1]:font-bold
                    [&_h1]:mb-6
                
                    [&_h2]:text-3xl
                    [&_h2]:font-semibold
                    [&_h2]:mt-10
                    [&_h2]:mb-5
            
                    [&_h3]:text-2xl
                    [&_h3]:font-semibold
                    [&_h3]:mt-8
                    [&_h3]:mb-4
                
                    [&_p]:mb-5
                    [&_p]:leading-8
                    [&_p]:text-lg
                    [&_p]:text-gray-700
                    dark:[&_p]:text-gray-300
                
                    [&_strong]:font-semibold
                    [&_strong]:text-orange-500
            
                    [&_em]:italic
            
                    [&_a]:text-orange-500
                    hover:[&_a]:underline
            
                    [&_ul]:my-6
                    [&_ul]:list-disc
                    [&_ul]:pl-8
                
                    [&_ol]:my-6
                    [&_ol]:list-decimal
                    [&_ol]:pl-8
            
                    [&_li]:mb-3
                    [&_li]:leading-8
                
                    [&_img]:rounded-xl
                    [&_img]:shadow-lg
                    [&_img]:mx-auto
                ">
            </div>
            
            <!-- Search Bar - Above Recipes -->
<div class="mb-8 w-full">
    <div class="relative">
        <div class="relative">
            <input 
                type="text" 
                id="search-input" 
                placeholder="Search for recipes..." 
                class="w-full rounded-2xl border border-stone-200 bg-white px-6 py-4 pl-14 text-sm text-slate-700 shadow-sm transition-all duration-300 focus:border-orange-500 focus:outline-none focus:ring-2 focus:ring-orange-500/20 dark:border-slate-700 dark:bg-slate-900 dark:text-slate-200 dark:placeholder-slate-400"
            />
            <i class="fas fa-search absolute left-5 top-1/2 -translate-y-1/2 text-slate-400 dark:text-slate-500"></i>
            <button id="clear-search" class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600 dark:text-slate-500 dark:hover:text-slate-300 hidden">
                <i class="fas fa-times-circle"></i>
            </button>
        </div>
        <div id="search-results" class="hidden absolute top-full left-0 right-0 mt-2 max-h-96 overflow-y-auto rounded-xl border border-stone-200 bg-white shadow-lg dark:border-slate-700 dark:bg-slate-900 z-50"></div>
    </div>
</div>
                <div id="recipe-container" class="
                    mx-auto
                    w-full
                    max-w-300

                    grid

                    grid-cols-[repeat(auto-fit,minmax(350px,1fr))]

                    gap-4
                    p-4

                    rounded-xl
                    border
                    border-amber-500

                    shadow-lg

                    box-border

                    max-md:grid-cols-[repeat(auto-fit,minmax(220px,1fr))]
                    ">
                </div>
                <div
                    id="pagination"
                    class="mt-16 flex flex-wrap items-center justify-center gap-3"
                ></div>
            </div>
        
        </main>

        <footer id="dynamic-footer">

        </footer>
        <script src="/js/config.js" defer></script>
        <script src="/js/project.js" defer></script>
        <script src="/js/navbar.js" defer></script>
        <script src="/js/sidebar.js" defer></script>
        <script src="/js/footer.js" defer></script>
        <script src="/js/search-bar.js" defer></script>
        <script src="/js/darkmode.js" defer></script>
<script src="/js/reveal.js" defer></script>

    </body>
</html>
